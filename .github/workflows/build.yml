#Based on template from: https://github.com/ThreeDeeJay/GitHub-Actions-build-templates/blob/main/Windows-CMake.yml
name: Build

env:
  GH_TOKEN: ${{github.token}}
  Branch: ${{github.ref_name}}
  Artifacts: build
  Title: ${{github.event.repository.name}}
  Executable: ${{github.event.repository.name}}.exe # *
#  DXSDK_DIR: C:\Program Files (x86)\Microsoft DirectX SDK (June 2010)\
#  VULKAN_VERSION: 1.1.130.0

on:
  push:
    Branches: $Branch
  pull_request:
    Branches: $Branch
  workflow_dispatch:

jobs:
  Windows:
    strategy:
      matrix:
        Platform: [Win32, x64]
        Configuration: [Release, Debug]

    runs-on: windows-2022
    steps:

    - name: Clone repo and submodules
      run: git clone https://${{github.repository_owner}}:${{github.token}}@github.com/${{github.repository}}.git "${{github.workspace}}" --branch ${{env.Branch}} --recurse-submodules #--depth 1 - Fetches entire commit history but breaks commit count

    - name: Get current date, commit hash and count
      run: |
        echo "FirstCommitHash=$(git rev-list --max-parents=0 HEAD --first-parent)" >> $env:GITHUB_ENV
        echo "CommitHash=$(git rev-parse HEAD)" >> $env:GITHUB_ENV
        echo "CommitHashShort=$(git rev-parse --short=7 HEAD)" >> $env:GITHUB_ENV
        echo "CommitCount=$(git rev-list --count HEAD)" >> $env:GITHUB_ENV
        echo "CommitDate=$(git show -s --date=format:'%Y-%m-%d' --format=%cd)" >> $env:GITHUB_ENV

    - name: Install Vulkan SDK
      uses: jakoch/install-vulkan-sdk-action@v1
      with:
        vulkan_version: 1.4.341.1
        install_runtime: false
        cache: true

    - name: Configure
      run: >
        cmake -A "${{matrix.Platform}}"
        -B ${{github.workspace}}/build 
        -DCMAKE_BUILD_TYPE=${{matrix.Configuration}}
        -DVKS3D_BUILD_TESTS=ON
        -DVKS3D_BUILD_DEMO=OFF
        -DSTEREO_BUILD_DEMO=ON

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{matrix.Configuration}}

    - name: List files
      run: ls -R

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{env.Title}}-${{matrix.Platform}}-${{matrix.Configuration}}
        path: |
          build/${{matrix.Configuration}}/VKS3D_x86.dll
          build/${{matrix.Configuration}}/VKS3D_x64.dll
          build/${{matrix.Configuration}}/vks3d_diag.exe
          build/${{matrix.Configuration}}/test_stereo_math.exe
          build/${{matrix.Configuration}}/test_spirv_patch.exe
          manifest/VKS3D_x86.json
          manifest/VKS3D_x64.json
          scripts/install.bat
          scripts/uninstall.bat
          scripts/Install-VKS3D.ps1
