#Based on template from: https://github.com/ThreeDeeJay/GitHub-Actions-build-templates/blob/main/Windows-CMake.yml
name: Build

env:
  GH_TOKEN: ${{github.token}}
  Branch: ${{github.ref_name}}
  Artifacts: Release
  Title: ${{github.event.repository.name}}

on:
  push:
    Branches: $Branch
  pull_request:
    Branches: $Branch
  workflow_dispatch:

jobs:
  Build:
    name: ${{matrix.Settings.Name}}-${{matrix.Configuration}}
    runs-on: windows-2022
    strategy:
      matrix:
        Configuration: [Release]
        Settings:
        - {
            Name: "Win32",
            Platform: "Win32",
            Architecture: "x86",
            Bits: "32"
          }
        - {
            Name: "Win64",
            Platform: "x64",
            Architecture: "x64",
            Bits: "64"
          }

    steps:

    - name: Clone repo and submodules
      run: git clone https://${{github.repository_owner}}:${{github.token}}@github.com/${{github.repository}}.git "${{github.workspace}}" --branch ${{env.Branch}}

    - name: Get current date, commit hash and count
      run: |
        echo "CommitCount=$(git rev-list --count HEAD)" >> $env:GITHUB_ENV
        echo "AttemptCount=${env:GITHUB_RUN_ATTEMPT}" >> $env:GITHUB_ENV

    - name: Cache Vulkan SDK
      id: cache-vulkan-sdk
      uses: actions/cache@v5
      with:
        path: "C:\\VulkanSDK\\1.3.296.0"
        key: VulkanSDK-1.3.296.0
    - name: Install Vulkan SDK
      if: steps.cache-vulkan-sdk.outputs.cache-hit != 'true'
      shell: cmd
      run: |
        curl --ssl-revoke-best-effort -L "https://sdk.lunarg.com/sdk/download/1.3.296.0/windows/VulkanSDK-1.3.296.0-Installer.exe" -o "VulkanSDK.exe"
        VulkanSDK.exe --accept-licenses --default-answer --confirm-command install com.lunarg.vulkan.32bit
    - name: Set VULKAN_SDK
      shell: powershell
      run: |
        echo "VULKAN_SDK=C:\VulkanSDK\1.3.296.0" >> $env:GITHUB_ENV

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.0.2

    - name: List files
      run: Get-ChildItem -Path "." -File -Recurse | Select-Object FullName

    - name: Cache NV3D-Lib
      id: cache-nv3dlib
      uses: actions/cache@v5
      with:
        path: "third_party\\NV3D-Lib"
        key: NV3DLib-${{matrix.Settings.Architecture}}
    - name: Clone NV3D-Lib
      if: steps.cache-nv3dlib.outputs.cache-hit != 'true'
      shell: cmd
      run: |
        git submodule update --init --recursive
    - name: Build NV3D-Lib
      if: steps.cache-nv3dlib.outputs.cache-hit != 'true'
      shell: cmd
      run: >
        msbuild
        /m "third_party\NV3D-Lib\NV3DLib.sln"
        /p:Configuration="${{matrix.Configuration}}-MD"
        /p:Platform="${{matrix.Settings.Architecture}}"
        /p:PlatformToolset=v143
        /t:NV3DLib

    - name: Download SPIR-V header
      run: |
        curl --ssl-revoke-best-effort --create-dirs -L "https://raw.githubusercontent.com/KhronosGroup/SPIRV-Headers/refs/heads/main/include/spirv/unified1/spirv.h" -o "third_party/SPIRV-Headers/include/spirv/unified1/spirv.h"

    - name: Collect dependencies
      if: steps.cache-nv3dlib.outputs.cache-hit != 'true'
      run: |
        move "third_party\NV3D-Lib\NV3DLib\lib\x${{matrix.Settings.Bits}}\Release-MD\NV3DLib-md.lib" "third_party\NV3D-Lib\NV3DLib\lib\NV3DLib.lib"

    - name: List files
      run: Get-ChildItem -Path "." -File -Recurse | Select-Object FullName

    - name: Configure
      run: >
        cmake
        -A "${{matrix.Settings.Platform}}"
        -B "${{github.workspace}}/build"
        -DCMAKE_BUILD_TYPE=${{matrix.Configuration}}
        -DVKS3D_BUILD_TESTS=OFF
        -DVKS3D_BUILD_DEMO=OFF
        -DSTEREO_BUILD_DEMO=OFF
        -DVKS3D_VER_PATCH=${{env.CommitCount}}
        -DVKS3D_VER_BUILD=${{env.AttemptCount}}

    - name: Build
      run: cmake --build "${{github.workspace}}/build" --config "${{matrix.Configuration}}"

    - name: List files
      run: ls -R

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{env.Title}}-${{matrix.Settings.Name}}-${{matrix.Configuration}}
        path: |
          build/${{matrix.Configuration}}/VKS3D_${{matrix.Settings.Architecture}}.dll
          build/${{matrix.Configuration}}/vks3d_diag.exe
          build/tests/${{matrix.Configuration}}/test_stereo_math.exe
          build/tests/${{matrix.Configuration}}/test_spirv_patch.exe
          build/tests/${{matrix.Configuration}}/VKS3D_demo.exe

  Release:
    name: Release
    runs-on: windows-latest
    needs: Build
    steps:

      - name: Clone repo and submodules
        run: git clone https://${{github.repository_owner}}:${{github.token}}@github.com/${{github.repository}}.git "${{github.workspace}}" --branch ${{env.Branch}}

      - name: Get current date, commit hash and count
        run: |
          echo "FirstCommitHash=$(git rev-list --max-parents=0 HEAD --first-parent)" >> $env:GITHUB_ENV
          echo "CommitHash=$(git rev-parse HEAD)" >> $env:GITHUB_ENV
          echo "CommitHashShort=$(git rev-parse --short=7 HEAD)" >> $env:GITHUB_ENV
          echo "CommitCount=$(git rev-list --count HEAD)" >> $env:GITHUB_ENV
          echo "CommitDate=$(git show -s --date=format:'%Y-%m-%d' --format=%cd)" >> $env:GITHUB_ENV

      - name: Download Win32
        uses: actions/download-artifact@v4
        with:
          name: ${{env.Title}}-Win32-Release
          path: Artifacts/Win32/

      - name: Download Win64
        uses: actions/download-artifact@v4
        with:
          name: ${{env.Title}}-Win64-Release
          path: Artifacts/Win64/

      - name: Deploy
        run: |
          mkdir "Release"
          cp "Artifacts\Win32\Release\VKS3D_x86.dll" "Release/VKS3D_x86.dll"
          cp "Artifacts\Win64\Release\VKS3D_x64.dll" "Release/VKS3D_x64.dll"
          cp "manifest\VKS3D_x86.json" "Release/VKS3D_x86.json"
          cp "manifest\VKS3D_x64.json" "Release/VKS3D_x64.json"
          cp "vks3d.ini" "Release/vks3d.ini"
          cp "scripts\install.bat" "Release/Install.bat"
          cp "scripts\uninstall.bat" "Release/Uninstall.bat"
          cp "scripts\debug.cmd" "Release/debug.cmd"
          cp "LICENSE" "Release/License.txt"
          cp "README.md" "Release/ReadMe.txt"
  
      - name: Compress artifacts
        if: github.event_name == 'push'
        run: |
          7z a "Release/${{env.Title}}.zip" "${{github.workspace}}/${{env.Artifacts}}/*" -mx=9
          cp "Release/${{env.Title}}.zip" "Release/${{env.Title}}_r${{env.CommitCount}}@${{env.CommitHashShort}}.zip"
  
      - name: Purge tag - latest-${{env.Branch}}
        if: github.event_name == 'push'
        run: |
          gh release delete latest-${{env.Branch}} --repo ${{github.repository}} --cleanup-tag --yes || true
  
      - name: Release - archive-${{env.Branch}}
        if: github.event_name == 'push'
        run: |
          gh release create archive-${{env.Branch}} --repo ${{github.repository}} --target ${{env.FirstCommitHash}} --latest=false --prerelease --title "${{env.Title}} ${{env.Branch}} build archive" --notes "Latest build: https://github.com/${{github.repository}}/releases/latest-${{env.Branch}}
          Build logs: https://github.com/${{github.repository}}/actions" || true
          gh release edit archive-${{env.Branch}} --repo ${{github.repository}} --target ${{env.FirstCommitHash}} --latest=false --prerelease --title "${{env.Title}} ${{env.Branch}} build archive" --notes "Latest build: https://github.com/${{github.repository}}/releases/latest-${{env.Branch}}
          Build logs: https://github.com/${{github.repository}}/actions" || true
          gh release upload archive-${{env.Branch}} --repo ${{github.repository}} --clobber "Release/${{env.Title}}_r${{env.CommitCount}}@${{env.CommitHashShort}}.zip"
  
      - name: Release - latest-${{env.Branch}}
        if: github.event_name == 'push'
        run: |
          gh release create latest-${{env.Branch}} --repo ${{github.repository}} --target ${{env.CommitHash}} --generate-notes --latest=false --prerelease --title "${{env.Title}} r${{env.CommitCount}}@${{env.CommitHashShort}}" --notes "Build archive: https://github.com/${{github.repository}}/releases/tag/archive-${{env.Branch}}
          Build log: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}"
          gh release upload latest-${{env.Branch}} --repo ${{github.repository}} --clobber "Release/${{env.Title}}.zip" "Release/${{env.Title}}_r${{env.CommitCount}}@${{env.CommitHashShort}}.zip"
