name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  # ── Windows MSVC x64 ───────────────────────────────────────────────────────
  build-windows-x64:
    name: Windows x64 (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.275.0
          install_runtime: false
          cache: true

      - name: Configure (x64)
        run: |
          cmake -B build_x64 -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DVKS3D_BUILD_TESTS=ON `
            -DVKS3D_BUILD_DEMO=OFF

      - name: Build (x64)
        run: cmake --build build_x64 --config Release --parallel

      - name: Test (x64)
        working-directory: build_x64
        run: ctest -C Release --output-on-failure

      - name: Upload x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VKS3D-windows-x64
          path: |
            build_x64/Release/VKS3D_x64.dll
            manifest/VKS3D_x64.json
            scripts/install.bat
            scripts/uninstall.bat
            scripts/Install-VKS3D.ps1

  # ── Windows MSVC x86 ───────────────────────────────────────────────────────
  build-windows-x86:
    name: Windows x86 (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.275.0
          install_runtime: false
          cache: true

      - name: Configure (x86)
        run: |
          cmake -B build_x86 -A Win32 `
            -DCMAKE_BUILD_TYPE=Release `
            -DVKS3D_BUILD_TESTS=ON `
            -DVKS3D_BUILD_DEMO=OFF

      - name: Build (x86)
        run: cmake --build build_x86 --config Release --parallel

      - name: Test (x86)
        working-directory: build_x86
        run: ctest -C Release --output-on-failure

      - name: Upload x86 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VKS3D-windows-x86
          path: |
            build_x86/Release/VKS3D_x86.dll
            manifest/VKS3D_x86.json

  # ── Package both into a single release ZIP ─────────────────────────────────
  package:
    name: Package release
    runs-on: windows-latest
    needs: [ build-windows-x64, build-windows-x86 ]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Download x64
        uses: actions/download-artifact@v4
        with:
          name: VKS3D-windows-x64
          path: dist/

      - name: Download x86
        uses: actions/download-artifact@v4
        with:
          name: VKS3D-windows-x86
          path: dist/

      - name: Copy manifests and scripts
        run: |
          Copy-Item manifest\VKS3D_x64.json dist\
          Copy-Item manifest\VKS3D_x86.json dist\
          Copy-Item scripts\install.bat      dist\
          Copy-Item scripts\uninstall.bat    dist\
          Copy-Item scripts\Install-VKS3D.ps1 dist\
          Copy-Item LICENSE                  dist\
          Copy-Item README.md                dist\

      - name: Create ZIP
        run: Compress-Archive -Path dist\* -DestinationPath VKS3D-${{ github.ref_name }}-windows.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: VKS3D-${{ github.ref_name }}-windows.zip
