; ─────────────────────────────────────────────────────────────────────────────
; VKS3D — Stereo Injection Layer Configuration
; ─────────────────────────────────────────────────────────────────────────────
;
; There are two INI files:
;   GLOBAL : <VKS3D DLL directory>\vks3d.ini   (this file — shared defaults)
;   LOCAL  : <game EXE directory>\vks3d.ini    (per-game overrides; wins over global)
;
; Both files use the same [VKS3D] section and key names.
; Missing keys inherit the built-in default listed in comments below.
;
; All keys are case-insensitive.
; ─────────────────────────────────────────────────────────────────────────────

[VKS3D]

; ── Master switch ────────────────────────────────────────────────────────────
; enabled=1   (0 = pass-through, VKS3D does nothing)
enabled=1

; ── Stereo parameters ────────────────────────────────────────────────────────
; separation  — clip-space half-IPD offset per eye (default 0.065)
;   Higher = wider stereo separation.  Start small (0.05) and increase.
separation=0.5

; convergence — clip-space convergence/HIT-point correction (default 0.030)
;   Positive = objects converge in front of screen.
convergence=0.1

; flip_eyes — swap left/right eye (default 0)
;   Use 1 if your 3D display shows a "cross-eyed" image.
flip_eyes=0

; ── Presentation mode ────────────────────────────────────────────────────────
; Controls how the stereo pair is sent to the display.
;
;   auto        **BROKEN** Try modes in order: dxgi → dx9 → sbs  (recommended)
;   dxgi        **BROKEN** DXGI 1.2 stereo swap chain (NVIDIA 3D Vision, classic driver ≤ 425)
;   dx9         **BROKEN** NvAPI + Direct3D9Ex exclusive fullscreen
;   nv3dlib		Direct3D 9 NVIDIA 3D Vision using NV3D-Lib (works on newer GPUs and drivers installed with 3D Fix Manager)
;   sbs         Side-by-side half-width  (any passive/active 3D TV, VR, OSVR)
;   tab         **BROKEN** Top-and-bottom half-height
;   interlaced  **BROKEN** Row-interleaved  (LG passive 3D monitors, etc.)
;   mono        2D pass-through — disables all stereo (debug)
presentation_mode=sbs

;presentation_mode=nv3dlib
; ── Output resolution / refresh rate ─────────────────────────────────────────
; Override the resolution VKS3D uses for the stereo output window / device.
; 0 means "use the resolution the application requested".
;
; For NVIDIA 3D Vision, both dxgi and dx9 modes need 1920x1080 @ 120 Hz
; (or your monitor's native 3D resolution).
width=0
height=0

; Refresh rate in Hz passed to the stereo output device.
; Set 120 for NVIDIA 3D Vision.  0 = driver / application default.
refresh_rate=120

; ── Half-FPS limiter ─────────────────────────────────────────────────────────
; half_fps=1 inserts a ~16 ms sleep after each frame.
; Useful for active-shutter displays where the driver throttles the GPU
; to 60 fps per eye and you want to match that explicitly.
half_fps=0

; ── Multiview rendering ───────────────────────────────────────────────────────
; multiview=1 injects VK_KHR_multiview into the final swapchain render pass.
; Both eyes are rendered in a single geometry pass (more efficient).
;
; WARNING: Requires ALL framebuffer attachments — including the depth buffer —
; to be VK_IMAGE_VIEW_TYPE_2D_ARRAY with layerCount >= 2.  Most apps only
; create single-layer depth buffers, causing VK_ERROR_DEVICE_LOST (-4) when
; multiview tries to write view 1 into layer 1 of the depth image.
;
; Default is 0 (disabled).  Enable only for apps that are known to work,
; or if you have intercepted/upgraded the depth buffer to be a 2D array.
; Shader stereo separation (via gl_ViewIndex) also requires multiview=1.
multiview=1

; ── Hotkey step sizes ────────────────────────────────────────────────────────
; Amount added / subtracted per Ctrl+F3..F6 key press.
;
; Ctrl+F3  Decrease separation    Ctrl+F4  Increase separation
; Ctrl+F5  Decrease convergence   Ctrl+F6  Increase convergence
; Ctrl+F7  Save current values to the LOCAL ini (game EXE directory)
step_separation=0.005
step_convergence=0.005

; ── Projection ────────────────────────────────────────────────────────
; Stereoscopic projection
;
;   off-axis        Paul Bourke's off-axis asymmetric frustum shift proportional to clip.w. Allows depth past the screen plane so it's suitable for 3D displays.
;   parallel        Parallel-axis constant clip-space shift. Only separation from infinity/screen depth, so it's suitable for Virtual Reality.
projection=off-axis